<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MathWeaver · 数学完整图景</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
:root{
  --paper:#F7F8FA; --grid:#E3E9F2; --ink:#16243D; --ink2:#5A6A85;
  --accent:#2B4C7E; --accent-soft:#E8EEF7; --ok:#2F7D5D; --amber:#B7791F;
  --err:#A23B2E; --card:#FFFFFF; --line:#D8DFE9; --soft:#F2F5FA;
  --serif:Georgia,"Times New Roman","Noto Serif SC",serif;
  --sans:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  --mono:ui-monospace,"SF Mono",Consolas,"Cascadia Mono",monospace;
}
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{font-family:var(--sans);color:var(--ink);background:var(--paper);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:28px 28px;font-size:14px}
#app{display:grid;grid-template-columns:215px minmax(360px,1fr) 46%;height:100vh}
@media(max-width:980px){#app{grid-template-columns:1fr}#rail,#work{display:none}}
#rail{border-right:1px solid var(--line);background:rgba(255,255,255,.75);backdrop-filter:blur(2px);display:flex;flex-direction:column}
#brand{padding:16px 14px 10px;border-bottom:1px solid var(--line)}
#brand h1{font-family:var(--serif);font-size:19px;letter-spacing:.3px}
#brand h1 em{font-style:normal;color:var(--accent)}
#brand p{font-size:11px;color:var(--ink2);margin-top:3px;line-height:1.5}
#newConv{margin:10px 12px 6px;padding:8px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:6px;cursor:pointer;font-size:13px}
#convList{flex:1;overflow-y:auto;padding:4px 8px}.conv{padding:8px 9px;border-radius:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:2px}.conv:hover{background:var(--accent-soft)}.conv.active{background:var(--accent-soft);border-left:3px solid var(--accent);padding-left:6px}.conv span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}.conv b{color:var(--ink2);font-weight:400;cursor:pointer;padding:0 4px}.conv b:hover{color:var(--err)}
#railFoot{padding:10px 12px;border-top:1px solid var(--line);font-size:12px}#railFoot button{width:100%;padding:7px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;color:var(--ink)}#llmDot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;background:var(--amber)}#llmDot.on{background:var(--ok)}
#chat{display:flex;flex-direction:column;border-right:1px solid var(--line);min-width:0}#msgs{flex:1;overflow-y:auto;padding:20px 22px}.msg{max-width:92%;margin-bottom:16px;line-height:1.65}.msg .who{font-size:11px;color:var(--ink2);margin-bottom:4px;font-family:var(--mono)}.msg .body{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:11px 14px;white-space:pre-wrap;word-break:break-word}.msg.user{margin-left:auto}.msg.user .body{background:var(--accent);color:#fff;border-color:var(--accent)}.msg .body code{font-family:var(--mono);background:rgba(43,76,126,.08);padding:1px 4px;border-radius:3px;font-size:12.5px}.msg.user .body code{background:rgba(255,255,255,.18)}
.toolflow{margin:10px 0 16px;border:1px dashed var(--line);border-radius:8px;background:rgba(255,255,255,.85);padding:9px 12px;font-family:var(--mono);font-size:12.3px}.toolflow .tf-title{color:var(--ink2);font-size:11px;margin-bottom:6px;font-family:var(--sans)}.tc{display:flex;gap:8px;align-items:baseline;padding:3px 0}.tc .st{width:14px;text-align:center}.tc .st.run{color:var(--amber)}.tc .st.ok{color:var(--ok)}.tc .st.bad{color:var(--err)}.tc .nm{color:var(--accent)}.tc .sum{color:var(--ink2);font-family:var(--sans)}
#composer{border-top:1px solid var(--line);background:rgba(255,255,255,.85);padding:12px 16px}#composer textarea{width:100%;min-height:64px;max-height:180px;resize:vertical;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-family:var(--sans);font-size:14px;color:var(--ink);background:#fff}#composer textarea:focus{outline:2px solid var(--accent);outline-offset:-1px}#composerRow{display:flex;justify-content:space-between;align-items:center;margin-top:8px}#composerRow label{font-size:12px;color:var(--ink2);display:flex;gap:5px;align-items:center}#send{padding:8px 22px;border:none;background:var(--accent);color:#fff;border-radius:6px;cursor:pointer;font-size:13.5px}#send:disabled{background:var(--ink2);cursor:wait}
#work{display:flex;flex-direction:column;background:rgba(255,255,255,.62);min-width:0}#tabs{display:flex;border-bottom:1px solid var(--line);background:rgba(255,255,255,.88)}#tabs button{flex:1;padding:11px 0;border:none;background:none;cursor:pointer;font-size:13.2px;color:var(--ink2);border-bottom:2px solid transparent;font-family:var(--sans)}#tabs button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}.pane{flex:1;overflow:auto;display:none;padding:0}.pane.active{display:block}.empty{color:var(--ink2);text-align:center;padding:70px 30px;font-size:13px;line-height:2}.sheet{padding:16px 18px}.sheet h3{font-family:var(--serif);font-size:18px;margin-bottom:4px}.sheet .sub{font-family:var(--mono);font-size:11px;color:var(--ink2);margin-bottom:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin-bottom:12px}.card h4{font-size:14px;margin-bottom:8px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}@media(max-width:1200px){.grid2,.grid3{grid-template-columns:1fr}}.muted{color:var(--ink2)}
.kv{margin-bottom:11px}.kv .k{font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}.kv .v{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:8px 11px;font-size:13.5px;line-height:1.6;overflow-x:auto}.pill{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11.5px;margin:0 5px 5px 0;background:var(--accent-soft);color:var(--accent);font-family:var(--mono)}.pill.warn{background:#FBF3E2;color:var(--amber)}.pill.err{background:#F8E9E6;color:var(--err)}.pill.okp{background:#E7F2ED;color:var(--ok)}.btnrow{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap}.btn{padding:7px 16px;border:1px solid var(--accent);background:#fff;color:var(--accent);border-radius:6px;cursor:pointer;font-size:13px;text-decoration:none}.btn.primary{background:var(--accent);color:#fff}.btn:hover{filter:brightness(.96)}.btn:disabled{opacity:.5;cursor:wait}
#graphMeta{padding:10px 14px;font-size:12px;color:var(--ink2);display:flex;gap:14px;flex-wrap:wrap;border-bottom:1px solid var(--line);background:rgba(255,255,255,.7)}#graphMeta .lg{display:flex;gap:4px;align-items:center}.dot{width:9px;height:9px;border-radius:50%;display:inline-block}#svgWrap{overflow:auto;height:calc(100% - 41px)}svg text{font-family:var(--sans)}.gnode{cursor:pointer}.gnode rect{fill:var(--card);stroke:var(--line);stroke-width:1.2;rx:6}.gnode:hover rect{stroke:var(--accent);stroke-width:2}.gnode.sel rect{stroke:var(--accent);stroke-width:2.4}.gnode.traced rect{stroke:var(--amber);stroke-width:2.4;fill:#FFF9EC}.gnode .ttl{font-size:11.5px;fill:var(--ink)}.gnode .typ{font-size:9px;fill:var(--ink2);font-family:var(--mono)}.gedge{fill:none;stroke:#B9C6D9;stroke-width:1.3;opacity:.8}.gedge.discharge{stroke:var(--ok)}.gedge.concl{stroke:var(--accent);stroke-width:1.8}.gedge.inst{stroke:var(--amber);stroke-dasharray:4 3}.gedge.traced{stroke:var(--amber);stroke-width:2.2;opacity:1}
.objTable{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}.objTable th,.objTable td{border-bottom:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top;font-size:12.8px}.objTable th{background:var(--soft);color:var(--ink2);font-weight:600}.formulaList{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.formulaChip{border:1px solid var(--line);background:#fff;border-radius:16px;padding:5px 10px;font-family:var(--mono);font-size:12px}
.formulaChip.bindable,.legendItem.bindable{cursor:pointer}
.formulaChip.hl,.legendItem.hl{border-color:var(--amber);background:#FFF6E3}
.diagramBox svg [data-vis]{transition:fill .15s,stroke .15s}
.diagramBox svg .visHl{fill:#F7CE7D;stroke:#A8650F;stroke-width:3}
.diagramBox svg text.visHl{fill:#8A5A13;stroke:none;font-weight:700}
.diagramBox svg line.visHl{stroke-width:3}.diagramBox{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:12px}.diagramBox svg{max-width:100%;height:auto}.diagramLegend{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}.legendItem{border:1px solid var(--line);border-radius:6px;padding:8px;background:#fff;font-size:12.5px}.capsule{border-left:4px solid var(--accent);background:#fff;border:1px solid var(--line);border-left-color:var(--accent);border-radius:8px;padding:12px 14px;margin-top:12px}.capsule ul{padding-left:18px;margin-top:4px}.capsule li{margin:2px 0}
#debugBox textarea{width:100%;min-height:52px;border:1px solid var(--line);border-radius:6px;padding:8px 10px;font-size:13px;font-family:var(--sans)}#debugAnswer{margin-top:10px;font-size:13.5px;line-height:1.7;white-space:pre-wrap;background:#FFFDF6;border:1px solid #EADFC3;border-radius:6px;padding:10px 12px;display:none}.lv{margin-bottom:14px}.lv .lvh{font-family:var(--mono);font-size:11px;color:var(--amber);margin-bottom:6px}.lnode{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:6px;padding:8px 11px;margin-bottom:6px;cursor:pointer}.lnode:hover{border-color:var(--accent)}.lnode.anchor{border-left-color:var(--amber);background:#FFFCF4}.lnode .t{font-size:13px;font-weight:600}.lnode .f{font-size:13px;margin-top:3px;overflow-x:auto}.anchorCard{background:#FFFCF4;border:1px solid #EADFC3;border-radius:6px;padding:10px 12px;margin-bottom:8px}.anchorCard .nm{font-weight:600;font-size:13px}.anchorCard .nm code{font-family:var(--mono);font-size:11px;color:var(--amber)}.anchorCard .ex{font-size:12.5px;color:var(--ink2);margin-top:4px;line-height:1.6}
.thinking{margin:8px 0 16px;border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:8px;background:#FFFDF6;padding:9px 12px}.thinking .tk-h{font-size:12px;color:var(--amber);font-family:var(--sans);display:flex;align-items:center;gap:7px}.thinking .tk-h .tk-n{color:var(--ink2);font-family:var(--mono);font-size:11px;margin-left:auto}.thinking .tk-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:tkpulse 1s infinite}@keyframes tkpulse{0%,100%{opacity:.3}50%{opacity:1}}.thinking pre.tk-b{margin-top:7px;max-height:118px;overflow:auto;font-family:var(--mono);font-size:11px;color:var(--ink2);white-space:pre-wrap;word-break:break-word;line-height:1.5;background:#fff;border:1px solid var(--line);border-radius:6px;padding:7px 9px}.thinking.done{border-left-color:var(--ok)}.thinking.done .tk-h{color:var(--ok)}.thinking.done .tk-dot{animation:none;background:var(--ok)}
#mask{position:fixed;inset:0;background:rgba(22,36,61,.35);display:none;align-items:center;justify-content:center;z-index:50}#mask.show{display:flex}#dlg{background:#fff;border-radius:10px;width:min(480px,92vw);padding:22px 24px;box-shadow:0 16px 50px rgba(22,36,61,.25)}#dlg h2{font-family:var(--serif);font-size:18px;margin-bottom:14px}#dlg label{display:block;font-size:12px;color:var(--ink2);margin:10px 0 4px}#dlg input{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:var(--mono)}#dlg .hint{font-size:11.5px;color:var(--ink2);margin-top:10px;line-height:1.6}#dlg .btnrow{justify-content:flex-end;margin-bottom:0}
</style>
</head>
<body>
<div id="app">
  <aside id="rail">
    <div id="brand"><h1>Math<em>Weaver</em></h1><p>问题 → 证明图谱 → MathScene 完整图景</p></div>
    <button id="newConv">+ 新会话</button><div id="convList"></div>
    <div id="railFoot"><button id="openSettings"><span id="llmDot"></span><span id="llmLabel">设置 · demo 模式</span></button></div>
  </aside>
  <main id="chat">
    <div id="msgs"></div>
    <div id="composer"><textarea id="input" placeholder="粘贴一道数学题，如 ℓ² 上乘法算子的谱分类，或“用面积法证明勾股定理”…&#10;Ctrl/⌘+Enter 发送"></textarea><div id="composerRow"><label><input type="checkbox" id="forceProblem"> 按“题目”处理</label><button id="send">发送</button></div></div>
  </main>
  <section id="work">
    <div id="tabs">
      <button data-pane="overview" class="active">总览</button>
      <button data-pane="graph">图谱</button>
      <button data-pane="diagram">图示</button>
      <button data-pane="objects">对象</button>
      <button data-pane="node">节点</button>
      <button data-pane="trace">追溯</button>
    </div>
    <div class="pane active" id="pane-overview"><div class="empty">尚无 MathScene。<br>输入题目后会生成总览、对象表、图示和节点细节。</div></div>
    <div class="pane" id="pane-graph"><div class="empty">尚无图谱。</div></div>
    <div class="pane" id="pane-diagram"><div class="empty">尚无图示。</div></div>
    <div class="pane" id="pane-objects"><div class="empty">尚无对象表。</div></div>
    <div class="pane" id="pane-node"><div class="empty">在图谱中点击任意节点。</div></div>
    <div class="pane" id="pane-trace"><div class="empty">在节点页点击“追溯到基础定义”。</div></div>
  </section>
</div>
<div id="mask"><div id="dlg"><h2>设置</h2><label>Base URL(OpenAI 兼容，以 /v1 结尾)</label><input id="s_base" placeholder="https://your-relay.example.com/v1"><label>API Key</label><input id="s_key" type="password" placeholder="sk-…(留空表示不修改)"><label>建图模型(heavy)</label><input id="s_heavy" placeholder="claude-sonnet-4-5"><label>轻任务模型(light)</label><input id="s_light" placeholder="可与 heavy 相同"><p class="hint">未配置时运行 demo 模式：支持“对角算子谱分类”和“勾股定理面积法”的黄金图谱与 MathScene。动画入口已移除。</p><div class="btnrow"><button class="btn" id="dlgCancel">取消</button><button class="btn primary" id="dlgSave">保存</button></div></div></div>
<script>
"use strict";
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const api=(p,opt)=>fetch(p,opt).then(r=>r.json());
const state={conv:null,graphId:null,graph:null,depths:{},scene:null,selNode:null,traced:new Set()};
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function tex(el,src,display=false){if(window.katex){try{katex.render(src||'',el,{throwOnError:false,displayMode:display});return}catch(e){}}el.textContent=src||'';el.style.fontFamily='var(--mono)';el.style.fontSize='12px'}
function mdText(s){return esc(s).replace(/^#{1,4}\s+(.+)$/gm,'<b>$1</b>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>')}
function md(s){s=String(s??'');if(!window.katex)return mdText(s);
  // 对话区数学渲染:$$..$$ / \[..\] 整行,$..$ / \(..\) 行内;流式时未闭合的公式先按原文显示
  const re=/\$\$([\s\S]+?)\$\$|\\\[([\s\S]+?)\\\]|\$([^$\n]+?)\$|\\\(([\s\S]+?)\\\)/g;
  let out='',last=0,m;
  while((m=re.exec(s))){out+=mdText(s.slice(last,m.index));
    const display=m[1]!==undefined||m[2]!==undefined;const src=m[1]??m[2]??m[3]??m[4];
    try{out+=katex.renderToString(src,{throwOnError:false,displayMode:display})}catch(e){out+=esc(m[0])}
    last=m.index+m[0].length}
  return out+mdText(s.slice(last))}
function pill(s,cls=''){return `<span class="pill ${cls}">${esc(s)}</span>`}
function listHtml(arr){return (arr&&arr.length)?`<ul>${arr.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`:'<span class="muted">无</span>'}
function switchPane(name){$$('#tabs button').forEach(b=>b.classList.toggle('active',b.dataset.pane===name));$$('.pane').forEach(p=>p.classList.toggle('active',p.id==='pane-'+name))}
$$('#tabs button').forEach(b=>b.onclick=()=>switchPane(b.dataset.pane));
function resetWork(){state.graphId=null;state.graph=null;state.depths={};state.scene=null;state.selNode=null;state.traced=new Set();$('#pane-overview').innerHTML='<div class="empty">尚无 MathScene。<br>输入题目后会生成总览、对象表、图示和节点细节。</div>';$('#pane-graph').innerHTML='<div class="empty">尚无图谱。</div>';$('#pane-diagram').innerHTML='<div class="empty">尚无图示。</div>';$('#pane-objects').innerHTML='<div class="empty">尚无对象表。</div>';$('#pane-node').innerHTML='<div class="empty">在图谱中点击任意节点。</div>';$('#pane-trace').innerHTML='<div class="empty">在节点页点击“追溯到基础定义”。</div>'}
async function loadConvs(){const list=await api('/api/conversations');const box=$('#convList');box.innerHTML='';list.forEach(c=>{const d=document.createElement('div');d.className='conv'+(state.conv===c.id?' active':'');const s=document.createElement('span');s.textContent=c.title||'(空)';const x=document.createElement('b');x.textContent='×';x.title='删除';x.onclick=async ev=>{ev.stopPropagation();await fetch('/api/conversations/'+c.id,{method:'DELETE'});if(state.conv===c.id){state.conv=null;$('#msgs').innerHTML='';resetWork()}loadConvs()};d.append(s,x);d.onclick=()=>openConv(c.id);box.appendChild(d)});if(!state.conv&&list.length)openConv(list[0].id);if(!list.length)newConv()}
async function newConv(){const c=await api('/api/conversations',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});await openConv(c.id);loadConvs()}$('#newConv').onclick=newConv;
async function openConv(id){state.conv=id;resetWork();loadConvs();const msgs=await api(`/api/conversations/${id}/messages`);const box=$('#msgs');box.innerHTML='';msgs.forEach(m=>{if(m.meta&&m.meta.tool_log)renderToolflowStatic(m.meta.tool_log);addMsg(m.role,m.content);if(m.meta&&m.meta.graph_id)state.graphId=m.meta.new_graph_id||m.meta.graph_id;if(m.meta&&m.meta.new_graph_id)state.graphId=m.meta.new_graph_id});if(state.graphId)await loadGraph(state.graphId)}
function addMsg(role,content){const d=document.createElement('div');d.className='msg '+(role==='user'?'user':'ai');d.innerHTML=`<div class="who">${role==='user'?'你':'MathWeaver'}</div><div class="body">${md(content||'')}</div>`;$('#msgs').appendChild(d);$('#msgs').scrollTop=1e9;return d.querySelector('.body')}
function newToolflow(){const wrap=document.createElement('div');wrap.className='toolflow';wrap.innerHTML='<div class="tf-title">推理流水线 · reasoning pipeline</div>';$('#msgs').appendChild(wrap);$('#msgs').scrollTop=1e9;const rows={};return{start(name,label){const r=document.createElement('div');r.className='tc';r.innerHTML=`<span class="st run">▸</span><span class="nm">${esc(name)}</span><span class="sum">${esc(label||'')}</span>`;wrap.appendChild(r);rows[name]=r},done(name,sum){const r=rows[name];if(!r)return;r.querySelector('.st').textContent='✓';r.querySelector('.st').className='st ok';if(sum)r.querySelector('.sum').textContent=sum},fail(name,msg){const e=document.createElement('div');e.className='tc';e.innerHTML=`<span class="st bad">✗</span><span class="sum">${esc(msg)}</span>`;wrap.appendChild(e)}}}
function renderToolflowStatic(log){const tf=newToolflow();log.forEach(ev=>{if(ev.type==='tool_call')tf.start(ev.name,ev.label);else if(ev.type==='tool_result')tf.done(ev.name,ev.summary);else if(ev.type==='pipeline_error')tf.fail(ev.stage,ev.message)})}
function newThinking(){const w=document.createElement('div');w.className='thinking';w.innerHTML='<div class="tk-h"><span class="tk-dot"></span><span class="tk-t">模型正在规划证明结构…</span><span class="tk-n"></span></div><pre class="tk-b"></pre>';$('#msgs').appendChild(w);$('#msgs').scrollTop=1e9;const body=w.querySelector('.tk-b'),num=w.querySelector('.tk-n');return{update(t){num.textContent=t.length+' 字';body.textContent=t.length>420?'…'+t.slice(-420):t;$('#msgs').scrollTop=1e9},done(){w.classList.add('done');w.querySelector('.tk-t').textContent='结构规划完成,正在组装结构图…';body.remove()}}}
async function send(){const ta=$('#input');const content=ta.value.trim();if(!content||!state.conv)return;ta.value='';$('#send').disabled=true;addMsg('user',content);const mode=$('#forceProblem').checked?'problem':'auto';let tf=null,aiBody=null,buf='',think=null,thinkBuf='';try{const resp=await fetch(`/api/conversations/${state.conv}/messages`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content,mode})});const reader=resp.body.getReader(),dec=new TextDecoder();let rest='';while(true){const{done,value}=await reader.read();if(done)break;rest+=dec.decode(value,{stream:true});const lines=rest.split('\n');rest=lines.pop();for(const line of lines){if(!line.startsWith('data:'))continue;let ev;try{ev=JSON.parse(line.slice(5))}catch(e){continue}if(ev.type==='tool_call'){if(!tf)tf=newToolflow();tf.start(ev.name,ev.label)}else if(ev.type==='tool_result'){tf&&tf.done(ev.name,ev.summary);if(ev.name==='generate_graph'&&think){think.done();think=null}}else if(ev.type==='thinking'){if(!think)think=newThinking();thinkBuf+=ev.content;think.update(thinkBuf)}else if(ev.type==='pipeline_error'){tf&&tf.fail(ev.stage,ev.message);if(think){think.done();think=null}}else if(ev.type==='token'){if(!aiBody)aiBody=addMsg('assistant','');buf+=ev.content;aiBody.innerHTML=md(buf);$('#msgs').scrollTop=1e9}else if(ev.type==='pipeline_done'){if(think){think.done();think=null}addMsg('assistant',ev.summary||'MathScene 已生成');state.graphId=ev.graph_id;await loadGraph(ev.graph_id);switchPane('overview')}}}}catch(e){addMsg('assistant','请求失败:'+e.message)}$('#send').disabled=false;loadConvs()}
$('#send').onclick=send;$('#input').addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter')send()});
async function loadGraph(gid){const data=await api('/api/graphs/'+gid);if(data.error)return;state.graph=data.graph;state.depths=data.depths;state.graphId=gid;const ex=await api('/api/graphs/'+gid+'/explain');state.scene=ex.scene||null;renderOverview();renderDiagram();renderObjects();renderGraph(data.validation)}
function renderOverview(){const sc=state.scene,g=state.graph;const pane=$('#pane-overview');if(!sc){pane.innerHTML='<div class="empty">尚无 MathScene。</div>';return}const bg=sc.background||{};const examples=sc.examples||[], ces=sc.counterexamples||[];pane.innerHTML='';const sh=document.createElement('div');sh.className='sheet';sh.innerHTML=`<h3>${esc(sc.title||g.title||'数学完整图景')}</h3><div class="sub">MathScene · ${esc(sc.generated_by||'deterministic')} · graph ${esc(sc.graph_id||'')}</div><div class="card"><h4>路线摘要</h4><p>${esc(sc.summary||'')}</p></div><div class="grid2"><div class="card"><h4>背景动机</h4><p>${esc(bg.motivation||'')}</p></div><div class="card"><h4>核心直觉模型</h4>${listHtml(bg.intuition_models||[])}</div></div><div class="grid2"><div class="card"><h4>先修/定义</h4>${(bg.prerequisites||[]).map(x=>pill(x)).join('')||'<span class="muted">无</span>'}</div><div class="card"><h4>常见坑</h4>${listHtml(bg.common_pitfalls||[])}</div></div>`;if(examples.length||ces.length){const c=document.createElement('div');c.className='card';c.innerHTML='<h4>例子 / 反例</h4>'+examples.map(e=>`<div>${pill('例子')}<b>${esc(e.title)}</b><br><span class="muted">${esc(e.description)}</span></div>`).join('<hr style="border:0;border-top:1px solid var(--line);margin:8px 0">')+ces.map(e=>`<div style="margin-top:8px">${pill('反例','warn')}<b>${esc(e.title)}</b><br><span class="muted">${esc(e.description)}</span></div>`).join('');sh.appendChild(c)}pane.appendChild(sh)}
function renderObjects(){const sc=state.scene;const pane=$('#pane-objects');const objs=(sc&&(sc.objects || (sc.object_registry&&sc.object_registry.objects) || sc.object_registry))||[];if(!objs.length){pane.innerHTML='<div class="empty">暂无对象表。</div>';return}pane.innerHTML='';const sh=document.createElement('div');sh.className='sheet';sh.innerHTML=`<h3>对象表</h3><div class="sub">${objs.length} 个符号 / 结构对象 / 关键命题</div>`;const table=document.createElement('table');table.className='objTable';table.innerHTML='<thead><tr><th>符号</th><th>类型</th><th>定义/作用</th><th>引入节点</th><th>关联</th></tr></thead><tbody></tbody>';const tb=table.querySelector('tbody');objs.forEach(o=>{const tr=document.createElement('tr');tr.innerHTML=`<td><b>${esc(o.name||o.id)}</b><br><code>${esc(o.symbol||o.latex||o.id)}</code></td><td>${esc(o.kind||'object')}</td><td>${esc(o.definition||'')}<br>${(o.properties||[]).map(x=>pill(x)).join('')}</td><td><a href="#" data-node="${esc(o.introduced_by||'')}">${esc(o.introduced_by||'')}</a></td><td>${(o.node_refs||[]).slice(0,4).map(x=>pill(x)).join('')}${(o.visual_refs||[]).map(x=>pill('visual:'+x,'warn')).join('')}</td>`;tr.querySelectorAll('a[data-node]').forEach(a=>a.onclick=ev=>{ev.preventDefault();const id=a.dataset.node;if(id&&state.graph.nodes.find(n=>n.id===id)){state.selNode=id;renderGraph();renderNode(id);switchPane('node')}});tb.appendChild(tr)});sh.appendChild(table);pane.appendChild(sh)}
function renderDiagram(){const sc=state.scene;const pane=$('#pane-diagram');const diagrams=(sc&&sc.diagrams)||[];if(!diagrams.length){pane.innerHTML='<div class="empty">暂无图示。</div>';return}pane.innerHTML='';const sh=document.createElement('div');sh.className='sheet';diagrams.forEach(d=>{const box=document.createElement('div');box.className='diagramBox';box.innerHTML=`<h3>${esc(d.title)}</h3><div class="sub">${esc(d.diagram_type)} · ${esc(d.renderer||'svg')}</div><p>${esc(d.description||d.summary||'')}</p>`;box.appendChild(renderDiagramSvg(d));const findVis=f=>{const hit=(d.bindings||[]).find(b=>(b.formula_refs||[]).some(r=>r===f||f.startsWith(r)||r.startsWith(f)));return hit&&hit.visual_object_id};const wire=(el,vid)=>{if(!vid||!box.querySelector(`[data-vis="${vid}"]`))return;el.classList.add('bindable');const set=on=>{el.classList.toggle('hl',on);box.querySelectorAll(`[data-vis="${vid}"]`).forEach(t=>t.classList.toggle('visHl',on))};el.onmouseenter=()=>set(true);el.onmouseleave=()=>{if(!el.classList.contains('pinned'))set(false)};el.onclick=()=>{const pin=!el.classList.contains('pinned');el.classList.toggle('pinned',pin);set(pin)}};if(d.formulas&&d.formulas.length){const fl=document.createElement('div');fl.className='formulaList';d.formulas.forEach(f=>{const chip=document.createElement('div');chip.className='formulaChip';tex(chip,f);fl.appendChild(chip);wire(chip,findVis(f))});box.appendChild(fl)}const leg=document.createElement('div');leg.className='diagramLegend';(d.objects||[]).forEach(o=>{const it=document.createElement('div');it.className='legendItem';it.innerHTML=`<b>${esc(o.label||o.id)}</b><br><span class="muted">${esc(o.kind)} · ${esc(o.math_object_id||'')}</span>`;leg.appendChild(it);wire(it,o.id)});box.appendChild(leg);sh.appendChild(box)});pane.appendChild(sh)}

ata-vis="v_closure_A"/><text x="90" y="62" font-size="14" data-vis="v_closure_A">closure(A)</text><circle cx="105" cy="130" r="5" fill="#2B4C7E" data-vis="v_A_points"/><circle cx="145" cy="100" r="5" fill="#2B4C7E" data-vis="v_A_points"/><circle cx="190" cy="150" r="5" fill="#2B4C7E" data-vis="v_A_points"/><circle cx="225" cy="122" r="5" fill="#2B4C7E" data-vis="v_A_points"/><text x="88" y="205" font-size="13" data-vis="v_A_points">A={a_n}</text><circle cx="285" cy="70" r="6" fill="#B7791F" data-vis="v_lambda"/><text x="296" y="74" font-size="15" data-vis="v_lambda">λ</text><line x1="285" y1="70" x2="246" y2="89" stroke="#B7791F" stroke-dasharray="4 3" data-vis="v_distance"/><text x="252" y="58" font-size="12" data-vis="v_distance">dist</text><text x="45" y="242" font-size="12">λ∈A:点谱 · λ∈closure(A)\\A:连续谱 · λ∉closure(A):预解集</text></svg>`}else{wrap.innerHTML=`<svg viewBox="0 0 360 180" width="360" height="180"><rect x="20" y="20" width="320" height="130" fill="#fff" stroke="#D8DFE9"/><text x="35" y="60" font-size="15">${esc(d.title)}</text><text x="35" y="92" font-size="12">${esc((d.objects||[]).slice(0,5).map(o=>o.label).join(' → '))}</text></svg>`}return wrap}
function renderGraph(validation){const g=state.graph,depths=state.depths;if(!g)return;const pane=$('#pane-graph');pane.innerHTML='';const meta=document.createElement('div');meta.id='graphMeta';const v=validation||{ok:true,errors:[],warnings:[]};meta.innerHTML=`<span><b>${esc(g.title||'')}</b> · v${g.version}</span><span>${g.nodes.length} 节点 / ${g.edges.length} 边</span><span class="lg">${v.ok?pill('校验通过','okp'):pill(v.errors.length+' 错误','err')}${v.warnings.length?pill(v.warnings.length+' 警告','warn'):''}</span><span class="lg"><span class="dot" style="background:var(--accent)"></span>conclude</span><span class="lg"><span class="dot" style="background:var(--amber)"></span>追溯</span>`;pane.appendChild(meta);const wrap=document.createElement('div');wrap.id='svgWrap';pane.appendChild(wrap);const cols={};g.nodes.forEach(n=>{const d=depths[n.id]||0;(cols[d]=cols[d]||[]).push(n)});const NW=176,NH=46,GX=70,GY=18,PAD=26;const maxRows=Math.max(1,...Object.values(cols).map(c=>c.length));const W=PAD*2+Object.keys(cols).length*(NW+GX)-GX;const H=PAD*2+maxRows*(NH+GY)-GY+30;const pos={};Object.keys(cols).sort((a,b)=>a-b).forEach(d=>{cols[d].sort((a,b)=>(a.context_id+a.id).localeCompare(b.context_id+b.id));cols[d].forEach((n,i)=>{pos[n.id]={x:PAD+d*(NW+GX),y:PAD+i*(NH+GY)}})});const NS='http://www.w3.org/2000/svg';const svg=document.createElementNS(NS,'svg');svg.setAttribute('width',W);svg.setAttribute('height',H);g.edges.forEach(e=>{const a=pos[e.source_id],b=pos[e.target_id];if(!a||!b)return;const p=document.createElementNS(NS,'path');const x1=a.x+NW,y1=a.y+NH/2,x2=b.x,y2=b.y+NH/2,c=(x2-x1)/2;p.setAttribute('d',`M${x1},${y1} C${x1+c},${y1} ${x2-c},${y2} ${x2},${y2}`);let cls='gedge';if(e.relation==='discharges_definition_condition'||e.relation==='verifies_condition')cls+=' discharge';else if(e.relation==='concludes')cls+=' concl';else if(e.relation==='instantiates'||e.relation==='constructs')cls+=' inst';if(state.traced.has(e.source_id)&&state.traced.has(e.target_id))cls+=' traced';p.setAttribute('class',cls);const t=document.createElementNS(NS,'title');t.textContent=e.relation+(e.justification?' — '+e.justification:'');p.appendChild(t);svg.appendChild(p)});const STATUS={valid:'var(--ok)',unchecked:'#9AA8BD',needs_review:'var(--amber)',invalid:'var(--err)'};g.nodes.forEach(n=>{const p=pos[n.id];if(!p)return;const gg=document.createElementNS(NS,'g');gg.setAttribute('class','gnode'+(state.selNode===n.id?' sel':'')+(state.traced.has(n.id)?' traced':''));gg.setAttribute('transform',`translate(${p.x},${p.y})`);const r=document.createElementNS(NS,'rect');r.setAttribute('width',NW);r.setAttribute('height',NH);gg.appendChild(r);const dot=document.createElementNS(NS,'circle');dot.setAttribute('cx',11);dot.setAttribute('cy',15);dot.setAttribute('r',4.2);dot.setAttribute('fill',STATUS[n.validation_status]||'#9AA8BD');gg.appendChild(dot);const t1=document.createElementNS(NS,'text');t1.setAttribute('x',22);t1.setAttribute('y',18);t1.setAttribute('class','ttl');t1.textContent=(n.title||n.id).slice(0,22);gg.appendChild(t1);const t2=document.createElementNS(NS,'text');t2.setAttribute('x',22);t2.setAttribute('y',35);t2.setAttribute('class','typ');t2.textContent=n.node_type;gg.appendChild(t2);gg.onclick=()=>{state.selNode=n.id;renderGraph(validation);renderNode(n.id);switchPane('node')};svg.appendChild(gg)});wrap.appendChild(svg)}
function renderNode(nid){const g=state.graph;const n=g.nodes.find(x=>x.id===nid);if(!n)return;const ctx=(g.contexts||[]).find(c=>c.id===n.context_id)||{};const cap=((state.scene||{}).step_capsules||[]).find(c=>c.node_id===nid);const pane=$('#pane-node');pane.innerHTML='';const sh=document.createElement('div');sh.className='sheet';sh.innerHTML=`<h3>${esc(n.title)}</h3><div class="sub">${esc(n.id)} · ${esc(n.node_type)} · ${esc(n.context_id)} · ${pill(n.validation_status,n.validation_status==='valid'?'okp':n.validation_status==='invalid'?'err':'warn')}</div>`;const kv=(k,builder)=>{const d=document.createElement('div');d.className='kv';d.innerHTML=`<div class="k">${esc(k)}</div>`;const v=document.createElement('div');v.className='v';builder(v);d.appendChild(v);sh.appendChild(d)};kv('Statement(LaTeX)',v=>{const x=document.createElement('div');tex(x,n.statement_latex,true);v.appendChild(x)});if(n.statement_natural)kv('解释',v=>v.textContent=n.statement_natural);if((ctx.assumptions||[]).length)kv('当前上下文假设',v=>ctx.assumptions.forEach(a=>{const r=document.createElement('div');tex(r,a);v.appendChild(r)}));const deps=g.edges.filter(e=>e.target_id===nid);if(deps.length)kv('依赖(前提)',v=>deps.forEach(e=>{const s=g.nodes.find(x=>x.id===e.source_id);const p=document.createElement('div');p.innerHTML=`${pill(e.relation)} `;const a=document.createElement('a');a.textContent=s?s.title:e.source_id;a.href='#';a.onclick=ev=>{ev.preventDefault();state.selNode=e.source_id;renderGraph();renderNode(e.source_id)};p.appendChild(a);v.appendChild(p)}));if((n.source_refs||[]).length)kv('基础来源(Registry)',v=>n.source_refs.forEach(r=>{const s=document.createElement('span');s.className='pill warn';s.textContent=r;v.appendChild(s)}));if((n.pitfalls||[]).length)kv('易错点',v=>n.pitfalls.forEach(p=>{const d=document.createElement('div');d.textContent='⚠ '+p;v.appendChild(d)}));if(n.explanation)kv('为什么这么想',v=>v.textContent=n.explanation);if(cap){const c=document.createElement('div');c.className='capsule';c.innerHTML=`<h4>StepCapsule · ${esc(cap.kind)}</h4><div class="kv"><div class="k">输入</div><div class="v">${listHtml(cap.inputs||[])}</div></div><div class="kv"><div class="k">动作 / 命题</div><div class="v">${esc(cap.action_or_claim||'')}</div></div><div class="kv"><div class="k">保证</div><div class="v">${listHtml(cap.guarantees||[])}</div></div><div class="kv"><div class="k">为什么合法</div><div class="v">${esc(cap.justification||'')}</div></div><div class="kv"><div class="k">后续使用</div><div class="v">${listHtml(cap.used_by||[])}</div></div>`;sh.appendChild(c)}const row=document.createElement('div');row.className='btnrow';const bt=document.createElement('button');bt.className='btn';bt.textContent='⊸ 追溯到基础定义';bt.onclick=()=>doTrace(nid);row.appendChild(bt);const bo=document.createElement('button');bo.className='btn';bo.textContent='查看对象表';bo.onclick=()=>switchPane('objects');row.appendChild(bo);sh.appendChild(row);const dbg=document.createElement('div');dbg.id='debugBox';dbg.innerHTML='<div class="kv"><div class="k">调试式追问(质疑这一步)</div><textarea id="dq" placeholder="例如:这里为什么合法? 是否漏了适用条件?"></textarea></div>';const db=document.createElement('button');db.className='btn';db.textContent='提交追问';db.onclick=async()=>{const q=$('#dq').value.trim();if(!q)return;db.disabled=true;db.textContent='分析中…';const r=await api(`/api/graphs/${state.graphId}/nodes/${nid}/debug`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});const ans=$('#debugAnswer');ans.style.display='block';ans.textContent=r.answer||r.error||'(无回答)';if(r.new_graph_id){ans.textContent+='\n\n→ 已生成修复后的图谱新版本，正在切换…';state.graphId=r.new_graph_id;await loadGraph(r.new_graph_id)}db.disabled=false;db.textContent='提交追问';openConv(state.conv)};dbg.appendChild(db);const ans=document.createElement('div');ans.id='debugAnswer';dbg.appendChild(ans);sh.appendChild(dbg);pane.appendChild(sh)}
async function doTrace(nid){const tr=await api(`/api/graphs/${state.graphId}/trace/${nid}`);if(tr.error)return;state.traced=new Set(tr.chain.map(c=>c.node_id));renderGraph();const pane=$('#pane-trace');pane.innerHTML='';const sh=document.createElement('div');sh.className='sheet';const root=state.graph.nodes.find(n=>n.id===nid);sh.innerHTML=`<h3>追溯:${esc(root?root.title:nid)}</h3><div class="sub">反向依赖 BFS · ${tr.chain.length} 个节点 → ${tr.foundation_anchors.length} 个基础锚点</div>`;const lv={};tr.chain.forEach(c=>(lv[c.level]=lv[c.level]||[]).push(c));Object.keys(lv).sort((a,b)=>a-b).forEach(L=>{const d=document.createElement('div');d.className='lv';d.innerHTML=`<div class="lvh">— 第 ${L} 层 ${L==0?'(目标)':''} —</div>`;lv[L].forEach(c=>{const nd=document.createElement('div');nd.className='lnode'+(c.is_anchor?' anchor':'');nd.innerHTML=`<div class="t">${esc(c.title)} <span style="font-family:var(--mono);font-size:10px;color:var(--ink2)">${esc(c.node_type)}</span></div>`;const f=document.createElement('div');f.className='f';tex(f,c.statement_latex);nd.appendChild(f);nd.onclick=()=>{state.selNode=c.node_id;renderGraph();renderNode(c.node_id);switchPane('node')};d.appendChild(nd)});sh.appendChild(d)});const ah=document.createElement('div');ah.className='lv';ah.innerHTML='<div class="lvh">— 基础锚点 —</div>';tr.foundation_anchors.forEach(a=>{const c=document.createElement('div');c.className='anchorCard';c.innerHTML=`<div class="nm">${esc(a.name)} <code>${esc(a.id)}</code></div>`;const f=document.createElement('div');f.className='f';tex(f,a.statement_latex);c.appendChild(f);if(a.explanation){const e=document.createElement('div');e.className='ex';e.textContent=a.explanation;c.appendChild(e)}ah.appendChild(c)});sh.appendChild(ah);pane.appendChild(sh);switchPane('trace')}
async function loadSettings(){const s=await api('/api/settings');$('#llmDot').classList.toggle('on',s.llm_configured);$('#llmLabel').textContent=s.llm_configured?'设置 · LLM 已连接':'设置 · demo 模式';$('#s_base').value=s.llm_base_url||'';$('#s_heavy').value=s.llm_model_heavy||'';$('#s_light').value=s.llm_model_light||'';return s}$('#openSettings').onclick=async()=>{await loadSettings();$('#mask').classList.add('show')};$('#dlgCancel').onclick=()=>$('#mask').classList.remove('show');$('#dlgSave').onclick=async()=>{const body={llm_base_url:$('#s_base').value.trim(),llm_model_heavy:$('#s_heavy').value.trim()||undefined,llm_model_light:$('#s_light').value.trim()||undefined};const key=$('#s_key').value.trim();if(key)body.llm_api_key=key;await api('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});$('#s_key').value='';$('#mask').classList.remove('show');loadSettings()};
